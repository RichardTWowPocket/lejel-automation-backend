services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lejel-backend
    restart: unless-stopped
    depends_on:
      lejel-postgres:
        condition: service_healthy
      lejel-redis:
        condition: service_healthy
    ports:
      - "${LEJEL_BACKEND_PORT:-3001}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TEMP_DIR=/app/temp
      - WHISPER_SERVICE_URL=http://whisper-worker:8000
      - DOCKER_SOCKET_PATH=/var/run/docker.sock
      - DATABASE_URL=postgresql://${POSTGRES_USER:-lejel}:${POSTGRES_PASSWORD:-lejel_password}@lejel-postgres:5432/${POSTGRES_DB:-lejel}
      - REDIS_HOST=lejel-redis
      - REDIS_PORT=6379
    env_file:
      - .env
    volumes:
      - ./temp:/app/temp
      - ./public/media:/app/public/media
      - ./public/fonts/custom:/app/public/fonts/custom
      - ./profiles:/app/profiles
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - lejel-network
      - shared-services-network  # For accessing shared whisper-worker

  lejel-postgres:
    image: postgres:15-alpine
    container_name: lejel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lejel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lejel_password}
      POSTGRES_DB: ${POSTGRES_DB:-lejel}
    volumes:
      - lejel-postgres-data:/var/lib/postgresql/data
    networks:
      - lejel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lejel -d lejel"]
      interval: 5s
      timeout: 5s
      retries: 5

  lejel-redis:
    image: redis:7-alpine
    container_name: lejel-redis
    restart: unless-stopped
    networks:
      - lejel-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # whisper-worker is now a shared service
  # See /root/shared/whisper-worker/

networks:
  lejel-network:
    external: true
    name: lejel-network  # External name for reverse proxy access
  shared-services-network:
    external: true
    name: shared-services-network  # For accessing shared whisper-worker

volumes:
  lejel-postgres-data:

